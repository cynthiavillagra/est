<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ParkControl - Iniciar Sesión">
    <title>ParkControl - Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
</head>

<body class="login-body">
    <!-- Background animated particles -->
    <div class="login-bg">
        <div class="login-bg__gradient"></div>
        <div class="login-bg__grid"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Login Container -->
    <div class="login-wrapper" id="loginWrapper">
        <div class="login-card" id="loginCard">
            <!-- Logo & Brand -->
            <div class="login-card__header">
                <div class="login-logo">
                    <div class="login-logo__icon">
                        <i class="fas fa-parking"></i>
                    </div>
                    <h1 class="login-logo__text">Park<span>Control</span></h1>
                </div>
                <p class="login-card__subtitle">Sistema de Gestión de Estacionamiento</p>
            </div>

            <!-- Login Form -->
            <form class="login-form" id="loginForm" autocomplete="off">
                <div class="form-group" id="groupUsuario">
                    <label for="inputUsuario">
                        <i class="fas fa-user"></i> Usuario
                    </label>
                    <div class="input-wrapper">
                        <input type="text" id="inputUsuario" name="usuario" placeholder="Ingresá tu usuario" required
                            autocomplete="username">
                        <span class="input-focus-border"></span>
                    </div>
                </div>

                <div class="form-group" id="groupPassword">
                    <label for="inputPassword">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="inputPassword" name="password" placeholder="Ingresá tu contraseña"
                            required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword"
                            aria-label="Mostrar contraseña">
                            <i class="fas fa-eye"></i>
                        </button>
                        <span class="input-focus-border"></span>
                    </div>
                </div>

                <!-- Error message -->
                <div class="login-error" id="loginError">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="loginErrorText">Usuario o contraseña incorrectos</span>
                </div>

                <!-- Remember me -->
                <div class="form-options">
                    <label class="checkbox-wrapper" for="rememberMe">
                        <input type="checkbox" id="rememberMe" name="remember">
                        <span class="checkmark"></span>
                        Recordar sesión
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-login" id="btnLogin">
                    <span class="btn-login__text">Iniciar Sesión</span>
                    <span class="btn-login__loader" id="loginLoader">
                        <i class="fas fa-spinner fa-spin"></i>
                    </span>
                </button>
            </form>

            <!-- Footer info -->
            <div class="login-card__footer">
                <div class="login-info">
                    <p><i class="fas fa-info-circle"></i> Usuarios de demostración:</p>
                    <div class="demo-users">
                        <div class="demo-user">
                            <span class="demo-role admin">Admin</span>
                            <code>admin / admin123</code>
                        </div>
                        <div class="demo-user">
                            <span class="demo-role operador">Operador</span>
                            <code>operador / oper123</code>
                        </div>
                        <div class="demo-user">
                            <span class="demo-role visor">Visor</span>
                            <code>visor / visor123</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Clock -->
        <div class="login-clock" id="loginClock">
            <i class="far fa-clock"></i>
            <span id="loginClockTime"></span>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // ============================================
        // LOGIN PAGE LOGIC
        // ============================================

        // Check if already logged in
        if (AuthService.isLoggedIn()) {
            window.location.href = 'index.html';
        }

        // Clock
        function updateLoginClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
            const date = now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('loginClockTime').textContent = `${time} — ${date}`;
        }
        updateLoginClock();
        setInterval(updateLoginClock, 1000);

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function () {
            const input = document.getElementById('inputPassword');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        });

        // Form submit
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const usuario = document.getElementById('inputUsuario').value.trim();
            const password = document.getElementById('inputPassword').value;
            const remember = document.getElementById('rememberMe').checked;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('btnLogin');

            // Reset error
            errorEl.classList.remove('show');
            document.getElementById('groupUsuario').classList.remove('error');
            document.getElementById('groupPassword').classList.remove('error');

            // Validate
            if (!usuario) {
                document.getElementById('groupUsuario').classList.add('error');
                showLoginError('Ingresá tu usuario');
                return;
            }
            if (!password) {
                document.getElementById('groupPassword').classList.add('error');
                showLoginError('Ingresá tu contraseña');
                return;
            }

            // Show loading
            btn.classList.add('loading');
            btn.disabled = true;

            // Simulate network delay
            await new Promise(resolve => setTimeout(resolve, 800));

            // Attempt login
            const result = AuthService.login(usuario, password, remember);

            if (result.success) {
                // Success animation
                btn.classList.remove('loading');
                btn.classList.add('success');
                btn.querySelector('.btn-login__text').textContent = '¡Bienvenido!';

                // Redirect after animation
                setTimeout(() => {
                    document.querySelector('.login-card').classList.add('login-card--exit');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 400);
                }, 600);
            } else {
                btn.classList.remove('loading');
                btn.disabled = false;
                showLoginError(result.message);

                // Shake animation
                document.getElementById('loginCard').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('loginCard').classList.remove('shake');
                }, 600);
            }
        });

        function showLoginError(message) {
            const errorEl = document.getElementById('loginError');
            document.getElementById('loginErrorText').textContent = message;
            errorEl.classList.add('show');
        }

        // Animated particles background
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.width = particle.style.height = (Math.random() * 4 + 1) + 'px';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        })();

        // Input focus effects
        document.querySelectorAll('.input-wrapper input').forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.form-group').classList.add('focused');
                input.closest('.form-group').classList.remove('error');
            });
            input.addEventListener('blur', () => {
                input.closest('.form-group').classList.remove('focused');
            });
        });
    </script>
</body>

</html>
